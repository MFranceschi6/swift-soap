# .swiftlint.yml

included:
  - Sources
  - Tests

excluded:
  - .build
  - Packages
  - DerivedData
  - vendor

reporter: "xcode"

opt_in_rules:
  - explicit_init              # preferisce .init(...) dove applicabile
  - empty_count
  - empty_string
  - first_where
  - last_where
  - sorted_first_last
  - operator_usage_whitespace
  - redundant_type_annotation
  - redundant_void_return
  - discouraged_optional_boolean
  - force_try
  - force_unwrapping

disabled_rules:
  - todo
  - trailing_whitespace

# Warning vs Error
explicit_init:
  severity: warning

line_length:
  warning: 120
  error: 160
  ignores_comments: true
  ignores_urls: true

function_body_length:
  warning: 60
  error: 120

type_body_length:
  warning: 300
  error: 450

file_length:
  warning: 500
  error: 800

cyclomatic_complexity:
  warning: 10
  error: 20

# Hard errors (CI deve fallire)
force_try:
  severity: error

force_unwrapping:
  severity: error

# Per-file rule overrides: relax thresholds for test targets
# Test files tolerate longer functions and types (fixtures, parameterised tables, loopback stubs)
custom_rules:
  no_print:
    name: "No print in library code"
    regex: '\bprint\('
    message: "Evita print() nella libreria: usa logging astratto o rimuovi."
    severity: warning
    included: "Sources/.*\\.swift"

# Override thresholds for test targets via per-file-disables approach.
# SwiftLint does not support path-scoped numeric overrides natively,
# so we rely on inline disables in individual test files that genuinely
# exceed the source thresholds. The following documents the agreed limits:
#
#   Tests/**:
#     function_body_length: warning 120, error 200
#     type_body_length:     warning 450, error 600
