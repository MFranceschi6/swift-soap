# .swiftlint.yml

included:
  - Sources
  - Tests

excluded:
  - .build
  - Packages
  - DerivedData
  - vendor

reporter: "xcode"

opt_in_rules:
  - explicit_init              # preferisce .init(...) dove applicabile
  - empty_count
  - empty_string
  - first_where
  - last_where
  - sorted_first_last
  - operator_usage_whitespace
  - redundant_type_annotation
  - redundant_void_return
  - discouraged_optional_boolean
  - force_try
  - force_unwrapping

disabled_rules:
  - todo
  - trailing_whitespace

# Warning vs Error
explicit_init:
  severity: warning

line_length:
  warning: 120
  error: 160
  ignores_comments: true
  ignores_urls: true

function_body_length:
  warning: 60
  error: 120

type_body_length:
  warning: 300
  error: 450

file_length:
  warning: 500
  # XMLDecoder+Codable.swift (804 lines) hosts 4 interdependent Codable container
  # types (_XMLTreeDecoder, _XMLKeyedDecodingContainer, _XMLUnkeyedDecodingContainer,
  # _XMLSingleValueDecodingContainer) that cross-reference private state; splitting
  # them across files would require exposing internal state or duplicating it.
  error: 850

cyclomatic_complexity:
  warning: 10
  # decodeScalar in XMLDecoder+Codable.swift dispatches over ~15 Foundation scalar
  # types (Bool, Int, Int8…Int64, UInt…UInt64, Float, Double, Decimal, String,
  # Date, Data, URL, UUID). This is a flat type-dispatch table, not cognitive
  # complexity; refactoring it into sub-functions would add indirection without
  # improving readability or correctness.
  error: 30

# Hard errors (CI deve fallire)
force_try:
  severity: error

force_unwrapping:
  severity: error

# type_name: allow _ prefix for private Codable implementation types.
# Types like _XMLTreeDecoder, _XMLKeyedDecodingContainer, _EnvelopePayload etc.
# are file-private implementation details that implement public protocols
# (Decoder, KeyedDecodingContainerProtocol, …). They cannot be marked private
# because they must be visible at file scope for conformance synthesis, and the
# _ prefix is the Swift-standard convention to signal "internal plumbing, not
# part of the public API". Renaming them to non-underscore names would create
# naming conflicts with the public API types.
type_name:
  allowed_symbols: ["_"]

# identifier_name: allow _ prefix for the same reason as type_name above.
# Protocol requirements like _xmlFieldNodeKindOverride cannot use access-level
# modifiers, so _ prefix is the only way to mark them as internal plumbing.
# Functions like _xmlAttributeLexicalValue() are internal protocol requirements
# that must start with _ to signal their non-public contract.
identifier_name:
  allowed_symbols: ["_"]

# Per-file rule overrides: relax thresholds for test targets
# Test files tolerate longer functions and types (fixtures, parameterised tables, loopback stubs)
custom_rules:
  no_print:
    name: "No print in library code"
    regex: '\bprint\('
    message: "Evita print() nella libreria: usa logging astratto o rimuovi."
    severity: warning
    included: "Sources/.*\\.swift"

# Override thresholds for test targets via per-file-disables approach.
# SwiftLint does not support path-scoped numeric overrides natively,
# so we rely on inline disables in individual test files that genuinely
# exceed the source thresholds. The following documents the agreed limits:
#
#   Tests/**:
#     function_body_length: warning 120, error 200
#     type_body_length:     warning 450, error 600
