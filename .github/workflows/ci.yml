name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  runtime-5_4:
    name: runtime-5.4 (linux)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: List versioned manifests
        run: ls -1 Package*.swift

      - name: Validate runtime lane with Swift 5.4
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            swift:5.4 \
            bash -lc '
              set -euo pipefail
              apt-get update >/dev/null
              apt-get install -y libxml2-dev >/dev/null
              rm -rf /tmp/swift-lane-workspace
              mkdir -p /tmp/swift-lane-workspace
              cp -a /workspace/Package*.swift /tmp/swift-lane-workspace/
              cp -a /workspace/Plugins /tmp/swift-lane-workspace/
              cp -a /workspace/Sources /tmp/swift-lane-workspace/
              cp -a /workspace/Tests /tmp/swift-lane-workspace/
              cd /tmp/swift-lane-workspace
              swift --version
              # Legacy lane is manifest-level smoke by design in the current roadmap state.
              swift package describe > /tmp/runtime-5.4-package-describe.txt
            '

  tooling-5_6_plus:
    name: tooling-5.6+ (linux)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: List versioned manifests
        run: ls -1 Package*.swift

      - name: Validate tooling lane with Swift 5.6
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            swift:5.6 \
            bash -lc '
              set -euo pipefail
              apt-get update >/dev/null
              apt-get install -y libxml2-dev >/dev/null
              rm -rf /tmp/swift-lane-workspace
              mkdir -p /tmp/swift-lane-workspace
              cp -a /workspace/Package*.swift /tmp/swift-lane-workspace/
              cp -a /workspace/Plugins /tmp/swift-lane-workspace/
              cp -a /workspace/Sources /tmp/swift-lane-workspace/
              cp -a /workspace/Tests /tmp/swift-lane-workspace/
              cd /tmp/swift-lane-workspace
              swift --version
              swift package dump-package > /tmp/tooling-5.6-dump-package.json
              if grep -q "\"name\"[[:space:]]*:[[:space:]]*\"SwiftSOAPXMLMacros\"" /tmp/tooling-5.6-dump-package.json; then
                echo "Unexpected macro targets in tooling-5.6+ lane"
                exit 1
              fi
              if grep -q "\"name\"[[:space:]]*:[[:space:]]*\"SwiftSOAPXMLOwnership6\"" /tmp/tooling-5.6-dump-package.json; then
                echo "Unexpected Swift 6 ownership target in tooling-5.6+ lane"
                exit 1
              fi
              swift build -c debug --jobs 1
              swift test --jobs 1 --parallel --num-workers 1
            '

  macro-5_9:
    name: macro-5.9 (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "5.9"

      - name: Smoke check
        run: swift --version

      - name: List versioned manifests
        run: ls -1 Package*.swift

      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev

      - name: Validate manifest selection for macro lane (5.9)
        run: |
          swift package dump-package > /tmp/macro-5.9-dump-package.json
          grep -q "\"name\"[[:space:]]*:[[:space:]]*\"SwiftSOAPXMLMacros\"" /tmp/macro-5.9-dump-package.json
          grep -q "\"name\"[[:space:]]*:[[:space:]]*\"SwiftSOAPXMLMacroImplementation\"" /tmp/macro-5.9-dump-package.json
          if grep -q "\"name\"[[:space:]]*:[[:space:]]*\"SwiftSOAPXMLOwnership6\"" /tmp/macro-5.9-dump-package.json; then
            echo "Swift 5.9 lane must not include SwiftSOAPXMLOwnership6"
            exit 1
          fi

      - name: Install SwiftLint (macOS)
        if: runner.os == 'macOS'
        run: brew install swiftlint

      - name: Run SwiftLint (macOS)
        if: runner.os == 'macOS'
        run: swiftlint lint --reporter github-actions-logging

      - name: Run SwiftLint (Linux)
        if: runner.os == 'Linux'
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/workdir" \
            -w /workdir \
            ghcr.io/realm/swiftlint:latest \
            swiftlint lint --reporter github-actions-logging

      - name: Build
        run: swift build -c debug

      - name: Run Tests
        run: swift test --jobs 1 --parallel --num-workers 1

      - name: Verify plugin manifest contract
        run: swift test -c debug --filter PluginManifestContractTests

  quality-5_10:
    name: quality-5.10 (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "5.10"

      - name: Smoke check
        run: swift --version

      - name: List versioned manifests
        run: ls -1 Package*.swift

      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev

      - name: Validate manifest selection for quality lane (5.10)
        run: |
          swift package dump-package > /tmp/quality-5.10-dump-package.json
          grep -q "\"name\"[[:space:]]*:[[:space:]]*\"SwiftSOAPXMLMacros\"" /tmp/quality-5.10-dump-package.json
          grep -q "\"name\"[[:space:]]*:[[:space:]]*\"SwiftSOAPXMLMacroImplementation\"" /tmp/quality-5.10-dump-package.json
          if grep -q "\"name\"[[:space:]]*:[[:space:]]*\"SwiftSOAPXMLOwnership6\"" /tmp/quality-5.10-dump-package.json; then
            echo "Swift 5.10 lane must resolve Package@swift-5.9.swift (no SwiftSOAPXMLOwnership6)"
            exit 1
          fi

      - name: Install SwiftLint (macOS)
        if: runner.os == 'macOS'
        run: brew install swiftlint

      - name: Run SwiftLint (macOS)
        if: runner.os == 'macOS'
        run: swiftlint lint --reporter github-actions-logging

      - name: Run SwiftLint (Linux)
        if: runner.os == 'Linux'
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/workdir" \
            -w /workdir \
            ghcr.io/realm/swiftlint:latest \
            swiftlint lint --reporter github-actions-logging

      - name: Build
        run: swift build -c debug

      - name: Run Tests (with Code Coverage)
        run: swift test --enable-code-coverage --jobs 1 --parallel --num-workers 1

      - name: Enforce Code Coverage (>= 90%)
        run: |
          BIN_PATH=$(swift build --show-bin-path)
          PROFDATA=$(find "$BIN_PATH/codecov" -name "default.profdata" -type f | head -n 1)
          TEST_BUNDLE=$(find "$BIN_PATH" -name "*.xctest" | head -n 1)

          if [ -z "$TEST_BUNDLE" ]; then
            echo "::error::Could not find test bundle in $BIN_PATH."
            exit 1
          fi

          if [ -d "$TEST_BUNDLE" ]; then
            TEST_BIN="$TEST_BUNDLE/Contents/MacOS/$(basename "$TEST_BUNDLE" .xctest)"
          else
            TEST_BIN="$TEST_BUNDLE"
          fi

          LLVM_COV="$(dirname "$(which swift)")/llvm-cov"
          if [ ! -x "$LLVM_COV" ]; then
            LLVM_COV="llvm-cov"
          fi

          if [ ! -f "$TEST_BIN" ] || [ -z "$PROFDATA" ] || [ ! -f "$PROFDATA" ]; then
            echo "::error::Could not find test binary ($TEST_BIN) or profdata ($PROFDATA)."
            exit 1
          fi

          COVERAGE_REPORT=$($LLVM_COV report -instr-profile="$PROFDATA" "$TEST_BIN" --ignore-filename-regex=".build|Tests|Package.swift")
          TOTAL_LINE_COV=$(printf '%s\n' "$COVERAGE_REPORT" | awk '/^TOTAL/ {print $10}')
          TOTAL_LINE_COV="${TOTAL_LINE_COV%\%}"
          echo "Total line coverage: $TOTAL_LINE_COV%"

          if [[ -z "$TOTAL_LINE_COV" ]]; then
            echo "::error::Unable to extract total line coverage."
            printf '%s\n' "$COVERAGE_REPORT"
            exit 1
          fi

          awk "BEGIN { exit !($TOTAL_LINE_COV >= 90.0) }" || {
            echo "::error::Code coverage $TOTAL_LINE_COV% is below the 90% threshold."
            exit 1
          }

  latest:
    name: latest-6.2 (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-14 temporarily disabled: Swift 6.2.1 triggers a spurious
        # #MutableGlobalVariable error inside NIOEmbedded (DispatchSpecificKey
        # not Sendable in macOS 14 SDK). Re-enable when setup-swift supports
        # Swift 6.2.4+ which ships the fix.
        os: [ubuntu-22.04]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Smoke check
        run: swift --version

      - name: List versioned manifests
        run: ls -1 Package*.swift

      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev

      - name: Validate manifest selection for latest lane
        run: |
          swift package dump-package > /tmp/latest-dump-package.json
          grep -q "\"name\"[[:space:]]*:[[:space:]]*\"SwiftSOAPXMLMacros\"" /tmp/latest-dump-package.json
          grep -q "\"name\"[[:space:]]*:[[:space:]]*\"SwiftSOAPXMLOwnership6\"" /tmp/latest-dump-package.json

      - name: Install SwiftLint (macOS)
        if: runner.os == 'macOS'
        run: brew install swiftlint

      - name: Run SwiftLint (macOS)
        if: runner.os == 'macOS'
        run: swiftlint lint --reporter github-actions-logging

      - name: Run SwiftLint (Linux)
        if: runner.os == 'Linux'
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/workdir" \
            -w /workdir \
            ghcr.io/realm/swiftlint:latest \
            swiftlint lint --reporter github-actions-logging

      - name: Build
        run: swift build -c debug

      - name: Run Tests
        run: swift test --jobs 1 --parallel --num-workers 1
