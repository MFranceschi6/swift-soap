          swift-version: "5.10"
          skip-verify-signature: true

      - name: Smoke check
        run: swift --version

      - name: TODO quality-5.10 lane
        run: |
          echo "TODO: wire lint/test/coverage checks in the dedicated epic."

  latest:
    name: latest (skeleton)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"
          skip-verify-signature: true

      - name: Smoke check
        run: swift --version

      - name: TODO latest lane
